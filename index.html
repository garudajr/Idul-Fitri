            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;

            height: 20px;
            font-family: Arial;

            padding: 0;
            cursor: pointer;
            background: var(--win-grey);
            border: 1px solid;

            font-size: 20px;
            border: 2px solid;
            border-color: black white white black;
            background: white;

            margin: 15px 0;
            outline: none;
        }

        button.btn-win {

            font-family: 'VT323', monospace;
            font-size: 22px;
            background: var(--win-grey);
            border: 2px solid;
            border-color: white black black white;
            cursor: pointer;
            outline: none;
        }

        button.btn-win:active {
            border-color: black white white black;

        /* Layar Hasil */

            text-align: left;
